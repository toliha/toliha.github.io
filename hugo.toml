baseURL = 'https://toliha.github.io/'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh-cn'
title = "Zhangjing's Blog"
theme = 'PaperMod'
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[taxonomies]
  category = 'categories'
  tag = 'tags'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[params]
  env = 'production'
  description = '一个专注于技术与生活记录的个人博客'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true

  [params.homeInfoParams]
    Title = '你好，欢迎来到我的博客'
    Content = '这里会持续更新 Hugo、前端和自动化部署相关内容。'

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ['title', 'permalink', 'summary', 'content']

[[menu.main]]
  identifier = 'archives'
  name = '归档'
  url = '/archives/'
  weight = 10

[[menu.main]]
  identifier = 'tags'
  name = '标签'
  url = '/tags/'
  weight = 20

[[menu.main]]
  identifier = 'search'
  name = '搜索'
  url = '/search/'
  weight = 30
